version: 1
applications:
  - appRoot: school saas/web
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            # Handle monorepo environment bridge
            - echo "SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY" >> .env.production
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
