version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - env | grep -e SUPABASE_SERVICE_ROLE_KEY -e TERMII_ -e PAYSTACK_SECRET_KEY -e NEXT_PUBLIC_ > .env.production
        - npm run build
        - cp .env.production .next/standalone/ || true
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
