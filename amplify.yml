version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd "school saas/web"
        - npm ci
    build:
      commands:
        - cd "school saas/web"
        - npm run build
  artifacts:
    baseDirectory: "school saas/web/.next"
    files:
      - '**/*'
  cache:
    paths:
      - "school saas/web/node_modules/**/*"
